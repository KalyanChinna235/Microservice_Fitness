server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/fitness_ai_db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    prefer-ip-address: true
    hostname: localhost
    instance-id: ${spring.application.name}:${server.port}

rabbitmq:
  exchange:
    name: fitness_exchange
  queue:
    name: activity_queue
  routing:
    key: activity_routing_key

gemini:
  api:
    key: ${GEMINI_API_KEY}
    base-url: https://generativelanguage.googleapis.com/v1beta
    instance-id: ${spring.application.name}:${server.port}