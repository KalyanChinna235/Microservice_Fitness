server:
  port: 8081

spring:
  application:
    name: ai-service

  datasource:
    url: jdbc:postgresql://localhost:5433/fitness_ai_db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
