server:
  port: 8082

spring:
  application:
    name: activity-service

  datasource:
    url: jdbc:mysql://localhost:3306/fitness_user_db
    username: root
    password: test
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    prefer-ip-address: true
    hostname: localhost
    instance-id: ${spring.application.name}:${server.port}

rabbitmq:
  exchange:
    name: fitness_exchange
  queue:
    name: activity_queue
  routing:
    key: activity_routing_key
    instance-id: ${spring.application.name}:${server.port}